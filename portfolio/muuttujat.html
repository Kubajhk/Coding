<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="muuttujat.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muuttujia ja tietotyyppejä</title>
</head>

<style>
body {
  background-image: url("wpps/wpp6.jpg");
}
</style>


<body>
    


<section>
    
    <h2>Muuttujat</h2>
    <button onclick="summa(a, b)">Summa</button>
    <button onclick="vahennys(b, c)">Vähennys</button>
    <button onclick="kerto(c, d)">Kerto</button>
    <button onclick="jako(d, a)">Jako</button>

</section>

<section>
    <h2>Laskin</h2>

    <input type="number" id="numero1" placeholder="Ensimmäinen luku">
    <input type="number" id="numero2" placeholder="Toinen luku">

    <br><br>

    <button onclick="laskin_summa()">+</button>
    <button onclick="laskin_vahennys()">-</button>
    <button onclick="laskin_kerto()">*</button>
    <button onclick="laskin_jako()">/</button>
</section>
    
</body>
</html>
